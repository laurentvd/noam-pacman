<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            color: #fff;
        }
        #score-board {
            display: flex;
            gap: 40px;
            margin-bottom: 16px;
            font-size: 24px;
        }
        canvas {
            border: 3px solid #5b9bd5;
            image-rendering: pixelated;
        }
        #message {
            margin-top: 16px;
            font-size: 14px;
            color: #ffff00;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div id="score-board">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVENS: <span id="lives">❤️❤️❤️</span></span>
    </div>
    <canvas id="game"></canvas>
    <div id="message">Pijltjestoetsen of WASD om te bewegen</div>
    <script src="game.js"></script>
</body>
</html>
